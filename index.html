<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calcium Sport</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">CS</div>
      <div>
        <div class="brand-title">Calcium Sport</div>
        <div class="brand-subtitle" id="seasonLabel">Football results centre</div>
      </div>
    </div>
    <div class="controls">
      <label class="select-wrap">
        <span>Competition</span>
        <select id="competitionSelect"></select>
      </label>
      <label class="select-wrap">
        <span>Jump to</span>
        <select id="jumpSelect">
          <option value="summary">Summary</option>
          <option value="results">Past results</option>
          <option value="fixtures">Scheduled games</option>
          <option value="standings">Tables</option>
          <option value="stats">Stats</option>
        </select>
      </label>
    </div>
  </header>

  <main>
    <section class="hero" id="summary">
      <div class="crumb">FOOTBALL <span>›</span> <span id="regionLabel">WORLD</span></div>
      <div class="hero-main">
        <img id="competitionLogo" class="competition-logo" alt="Competition logo" />
        <div>
          <h1 id="competitionTitle">Loading...</h1>
          <p id="competitionMeta">Loading competition data</p>
          <div class="progress">
            <span id="startDate">Start</span>
            <div class="bar"><div id="progressBar"></div></div>
            <span id="endDate">End</span>
          </div>
        </div>
      </div>
      <nav class="tabs">
        <button data-target="summary" class="active">Summary</button>
        <button data-target="results">Results</button>
        <button data-target="fixtures">Fixtures</button>
        <button data-target="standings">Standings</button>
        <button data-target="stats">Stats</button>
      </nav>
    </section>

    <section class="toolbar card">
      <input id="searchInput" type="search" placeholder="Search team or player..." />
      <select id="groupFilter"><option value="all">All groups/tables</option></select>
      <button id="clearFilters">Clear</button>
    </section>

    <section class="grid-two">
      <div class="card" id="latestCard">
        <h2>Latest results</h2>
        <div id="latestResults" class="match-list"></div>
      </div>
      <div class="card" id="upcomingCard">
        <h2>Upcoming fixtures</h2>
        <div id="upcomingFixtures" class="match-list"></div>
      </div>
    </section>

    <section class="card section" id="results">
      <div class="section-head">
        <h2>Past results</h2>
        <span id="resultsCount"></span>
      </div>
      <div id="resultsList" class="match-list big"></div>
    </section>

    <section class="card section" id="fixtures">
      <div class="section-head">
        <h2>Scheduled games</h2>
        <span id="fixturesCount"></span>
      </div>
      <div id="fixturesList" class="match-list big"></div>
    </section>

    <section class="card section" id="standings">
      <div class="section-head">
        <h2>Standings</h2>
        <span>Sorted by points, goal difference, goals scored</span>
      </div>
      <div id="standingsWrap" class="standings-grid"></div>
    </section>

    <section class="card section" id="stats">
      <div class="section-head">
        <h2>Player stats</h2>
      </div>
      <div class="stats-grid">
        <div><h3>Top scorers</h3><div id="topScorers"></div></div>
        <div><h3>Top assists</h3><div id="topAssists"></div></div>
        <div><h3>Yellow cards</h3><div id="yellowCards"></div></div>
        <div><h3>Red cards</h3><div id="redCards"></div></div>
      </div>
    </section>
  </main>

  <button id="toTop" title="Back to top">↑</button>
  <script src="script.js"></script>
</body>
</html>
